<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap | Stats preview card</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: hsl(233, 47%, 7%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .card-custom {
      background-color: hsl(244, 38%, 16%);
      border-radius: 10px;
      overflow: hidden;
      max-width: 1100px;
    }

    .accent {
      color: hsl(277, 64%, 61%);
    }

    .text-muted-custom {
      color: hsla(0, 0%, 100%, 0.75);
    }

    .stat-title {
      color: hsla(0, 0%, 100%, 0.6);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <div class="card-custom container">
    <div class="row g-0 flex-column-reverse flex-md-row">

      <div class="col-md-6 p-5 text-white">
        <h1 class="fw-bold">
          Get <span class="accent">insights</span> that help your business grow.
        </h1>

        <p class="text-muted-custom mt-4">
          Discover the benefits of data analytics and make better decisions regarding revenue,
          customer experience, and overall efficiency.
        </p>

        <div class="row mt-5 text-center text-md-start">
          <div class="col">
            <h3 class="fw-bold">10k+</h3>
            <p class="stat-title">companies</p>
          </div>
          <div class="col">
            <h3 class="fw-bold">314</h3>
            <p class="stat-title">templates</p>
          </div>
          <div class="col">
            <h3 class="fw-bold">12m+</h3>
            <p class="stat-title">queries</p>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <img src="./images/image-header-desktop.jpg" class="img-fluid w-100 h-100" alt="">
      </div>

    </div>
  </div>

</body>
</html>

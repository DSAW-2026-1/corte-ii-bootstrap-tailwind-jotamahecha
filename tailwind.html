<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind | Stats preview card</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            main: 'hsl(233, 47%, 7%)',
            card: 'hsl(244, 38%, 16%)',
            accent: 'hsl(277, 64%, 61%)'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            lexend: ['Lexend Deca', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body class="bg-main min-h-screen flex items-center justify-center font-inter">

  <div class="bg-card rounded-lg overflow-hidden max-w-5xl flex flex-col md:flex-row">

    <div class="p-10 text-white md:w-1/2">
      <h1 class="text-3xl font-bold">
        Get <span class="text-accent">insights</span> that help your business grow.
      </h1>

      <p class="text-white/75 mt-6">
        Discover the benefits of data analytics and make better decisions regarding revenue,
        customer experience, and overall efficiency.
      </p>

      <div class="flex flex-col md:flex-row gap-8 mt-10 text-center md:text-left">
        <div>
          <h3 class="text-2xl font-bold">10k+</h3>
          <p class="text-white/60 text-xs tracking-widest uppercase">companies</p>
        </div>
        <div>
          <h3 class="text-2xl font-bold">314</h3>
          <p class="text-white/60 text-xs tracking-widest uppercase">templates</p>
        </div>
        <div>
          <h3 class="text-2xl font-bold">12m+</h3>
          <p class="text-white/60 text-xs tracking-widest uppercase">queries</p>
        </div>
      </div>
    </div>

    <div class="md:w-1/2">
      <img src="./images/image-header-desktop.jpg" class="w-full h-full object-cover" alt="">
    </div>

  </div>

</body>
</html>
